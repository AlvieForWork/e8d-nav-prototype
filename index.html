<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>E8D 後台導覽結構原型</title>
<style>
  :root {
    --bg: #f7f8fc;
    --surface: #ffffff;
    --surface-2: #f1f2f9;
    --border: #e6e8f2;
    --text: #20253d;
    --text-muted: #6b7085;
    --accent: #4c50d6;
    --accent-contrast: #ffffff;
    --accent-soft: #ececfb;
    --phase2: #b1690b;
    --phase2-soft: #fdf1e0;
    --shadow: 0 1px 2px rgba(30,32,60,0.04), 0 4px 14px rgba(30,32,60,0.06);
    --font-ui: -apple-system, BlinkMacSystemFont, "PingFang TC", "Noto Sans TC", "Segoe UI", Roboto, sans-serif;
    --font-mono: ui-monospace, "SF Mono", "Cascadia Code", Menlo, monospace;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--font-ui);
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
  }
  button { font-family: inherit; font-size: inherit; color: inherit; }
  :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  .shell { display: flex; min-height: 100vh; position: relative; }

  /* ---------- Sidebar ---------- */
  .sidebar {
    width: 264px;
    flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }
  .sidebar-brand {
    height: 56px;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 18px;
    border-bottom: 1px solid var(--border);
    font-weight: 600;
    font-size: 15px;
    flex-shrink: 0;
  }
  .sidebar-brand .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
  .nav-scroll { padding: 10px 10px 20px; display: flex; flex-direction: column; gap: 2px; }

  .nav-row {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    padding: 9px 12px;
    border-radius: 999px;
    border: none;
    background: transparent;
    text-align: left;
    cursor: pointer;
    color: var(--text);
    transition: background .12s ease;
  }
  .nav-row:hover { background: var(--surface-2); }
  .nav-row.active { background: var(--accent-soft); color: var(--accent); font-weight: 600; }
  .nav-row .ico { flex-shrink: 0; width: 18px; height: 18px; opacity: .85; }
  .nav-row.active .ico { opacity: 1; }
  .nav-row .label { flex: 1; font-size: 13.5px; }
  .nav-row .chev { width: 14px; height: 14px; flex-shrink: 0; opacity: .55; transition: transform .15s ease; }
  .nav-row[aria-expanded="true"] .chev { transform: rotate(90deg); }
  .nav-row .ext-mark { width: 12px; height: 12px; opacity: .5; flex-shrink: 0; }

  .nav-group-children {
    display: flex;
    flex-direction: column;
    gap: 1px;
    padding: 2px 0 6px 14px;
    margin-left: 15px;
    border-left: 1px solid var(--border);
  }
  .nav-child {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 12px;
    border-radius: 999px;
    border: none;
    background: transparent;
    text-align: left;
    cursor: pointer;
    color: var(--text-muted);
    font-size: 13px;
  }
  .nav-child:hover { background: var(--surface-2); color: var(--text); }
  .nav-child.active { background: var(--accent-soft); color: var(--accent); font-weight: 600; }
  .nav-child .label { flex: 1; }
  .p2-badge {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .02em;
    color: var(--phase2);
    background: var(--phase2-soft);
    padding: 1px 5px;
    border-radius: 5px;
    flex-shrink: 0;
  }

  /* ---------- 側欄點數卡（全域元件） ---------- */
  .points-card {
    margin: auto 10px 0;
    border-radius: 14px;
    background: linear-gradient(160deg, #5a5edd 0%, var(--accent) 55%, #3a3eb8 100%);
    color: #fff;
    padding: 14px 14px 12px;
    box-shadow: var(--shadow);
  }
  .points-card .pc-head {
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
    padding-bottom: 10px; margin-bottom: 10px;
    border-bottom: 1px solid rgba(255,255,255,.22);
  }
  .points-card .pc-name { font-weight: 700; font-size: 14px; }
  .points-card .pc-plan {
    font-size: 10.5px; font-weight: 700; letter-spacing: .02em;
    background: rgba(255,255,255,.24); padding: 2px 9px; border-radius: 999px;
  }
  .points-card .pc-label {
    display: flex; align-items: center; gap: 5px;
    font-size: 11.5px; opacity: .85; margin-bottom: 2px;
  }
  .points-card .pc-label .ico { width: 12px; height: 12px; opacity: .8; }
  .points-card .pc-value { font-size: 22px; font-weight: 700; margin-bottom: 10px; }
  .points-card .pc-value .unit { font-size: 11.5px; font-weight: 500; opacity: .8; margin-left: 3px; }
  .points-card .pc-usage-row {
    display: flex; align-items: baseline; justify-content: space-between;
    font-size: 11.5px; margin-bottom: 5px;
  }
  .points-card .pc-usage-row .num { opacity: .85; font-variant-numeric: tabular-nums; }
  .points-card .pc-bar {
    height: 5px; border-radius: 999px; background: rgba(255,255,255,.25);
    overflow: hidden; margin-bottom: 12px;
  }
  .points-card .pc-bar span { display: block; height: 100%; width: 62%; border-radius: 999px; background: #fff; }
  .points-card .pc-topup {
    width: 100%; padding: 8px 0; border-radius: 9px;
    border: 1px solid rgba(255,255,255,.55); background: rgba(255,255,255,.14);
    color: #fff; font-weight: 700; font-size: 13px; cursor: pointer;
    transition: background .12s ease;
  }
  .points-card .pc-topup:hover { background: rgba(255,255,255,.26); }

  .sidebar-hint {
    padding: 12px 16px 16px;
    font-size: 11.5px;
    color: var(--text-muted);
  }

  /* ---------- Topbar ---------- */
  .main-col { flex: 1; min-width: 0; display: flex; flex-direction: column; }
  .topbar {
    height: 56px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    gap: 12px;
  }
  .crumb { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-muted); min-width: 0; }
  .crumb .current { color: var(--text); font-weight: 600; font-size: 14.5px; }
  .crumb .sep { opacity: .5; }
  .hamburger { display: none; }
  .topbar-actions { display: flex; align-items: center; gap: 4px; position: relative; }
  .icon-btn {
    width: 32px; height: 32px; border-radius: 8px; border: none; background: transparent;
    display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-muted);
    position: relative;
  }
  .icon-btn:hover { background: var(--surface-2); color: var(--text); }
  .icon-btn .ico { width: 17px; height: 17px; }
  .avatar-btn {
    width: 30px; height: 30px; border-radius: 50%; background: var(--accent); color: var(--accent-contrast);
    border: none; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700;
    cursor: pointer; margin-left: 4px;
  }
  .popover {
    position: absolute; top: 40px; right: 0; width: 240px; background: var(--surface);
    border: 1px solid var(--border); border-radius: 10px; box-shadow: var(--shadow);
    padding: 12px 14px; font-size: 12.5px; color: var(--text-muted); z-index: 20; display: none;
  }
  .popover.open { display: block; }
  .popover .t { color: var(--text); font-weight: 600; font-size: 13px; margin-bottom: 4px; }
  .popover button.logout {
    margin-top: 8px; width: 100%; padding: 7px 0; border-radius: 7px; border: 1px solid var(--border);
    background: var(--surface-2); color: var(--text); cursor: pointer; font-size: 12.5px;
  }
  .popover button.logout:hover { background: var(--bg); }

  /* ---------- Content ---------- */
  .content { flex: 1; overflow-y: auto; padding: 22px 28px 40px; }
  .proto-note {
    display: flex; gap: 10px; align-items: flex-start; background: var(--surface);
    border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; margin-bottom: 20px;
    font-size: 12.5px; color: var(--text-muted); max-width: 640px;
  }
  .proto-note .ico { width: 16px; height: 16px; flex-shrink: 0; margin-top: 1px; color: var(--accent); }
  .proto-note b { color: var(--text); }

  .page-head { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
  .page-head h1 { font-size: 19px; font-weight: 700; margin: 0; text-wrap: balance; }
  .page-sub { font-size: 12.5px; color: var(--text-muted); margin: 4px 0 18px; }

  .tabbar { display: flex; gap: 4px; border-bottom: 1px solid var(--border); margin-bottom: 18px; flex-wrap: wrap; }
  .tab {
    padding: 9px 14px; font-size: 13px; color: var(--text-muted); background: none; border: none;
    border-bottom: 2px solid transparent; cursor: pointer; margin-bottom: -1px; white-space: nowrap;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }

  .detail-note {
    font-size: 12.5px; color: var(--text-muted); margin: -8px 0 16px; max-width: 640px;
  }

  .flag-note {
    display: flex; gap: 8px; align-items: flex-start; background: var(--phase2-soft);
    border: 1px solid color-mix(in srgb, var(--phase2) 30%, transparent);
    border-radius: 9px; padding: 10px 12px; margin: 0 0 18px; font-size: 12.5px; color: var(--text);
    max-width: 640px;
  }
  .flag-note .ico { width: 15px; height: 15px; color: var(--phase2); flex-shrink: 0; margin-top: 1px; }

  .placeholder-card {
    border: 1.5px dashed var(--border); border-radius: 12px; padding: 32px 24px; text-align: center;
    color: var(--text-muted); font-size: 13px; background: var(--surface); max-width: 640px;
  }
  .placeholder-card .big { font-size: 13.5px; color: var(--text); font-weight: 600; margin-bottom: 4px; }

  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 14px; max-width: 900px; }
  .kpi-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px;
  }
  .kpi-card .k-label { font-size: 12.5px; color: var(--text-muted); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
  .kpi-card .k-body { font-size: 12.5px; color: var(--text-muted); }
  .kpi-card .k-body div + div { margin-top: 3px; }

  .ext-card {
    display: flex; gap: 14px; align-items: flex-start; background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 20px; max-width: 560px;
  }
  .ext-card .ico { width: 22px; height: 22px; color: var(--accent); flex-shrink: 0; margin-top: 2px; }
  .ext-card h2 { font-size: 15px; margin: 0 0 6px; }
  .ext-card p { margin: 0; font-size: 12.5px; color: var(--text-muted); }

  .toast {
    position: fixed; bottom: 22px; right: 22px; background: var(--text); color: var(--bg);
    padding: 10px 16px; border-radius: 8px; font-size: 12.5px; box-shadow: var(--shadow);
    opacity: 0; transform: translateY(6px); pointer-events: none; transition: opacity .18s ease, transform .18s ease;
    z-index: 50;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  .backdrop { display: none; }

  @media (max-width: 767px) {
    .hamburger { display: flex; }
    .sidebar {
      position: fixed; top: 0; left: 0; bottom: 0; z-index: 40;
      transform: translateX(-100%); transition: transform .2s ease; box-shadow: var(--shadow);
    }
    .shell.sidebar-open .sidebar { transform: translateX(0); }
    .backdrop {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,.35); z-index: 30;
    }
    .shell.sidebar-open .backdrop { display: block; }
    .content { padding: 18px 16px 32px; }
  }
  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; }
  }
</style>
</head>
<body>

<div class="shell" id="shell">
  <aside class="sidebar" id="sidebar" aria-label="主導覽">
    <div class="sidebar-brand">
      <span class="dot"></span> E8D
    </div>
    <nav class="nav-scroll" id="navScroll"></nav>
    <div class="points-card" aria-label="點數卡">
      <div class="pc-head">
        <span class="pc-name">Alvie</span>
        <span class="pc-plan">企業帳號</span>
      </div>
      <div class="pc-label">剩餘點數
        <svg class="ico" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="9" cy="9" r="6.5"/><path d="M9 8.2v4"/><circle cx="9" cy="5.8" r=".4" fill="currentColor"/></svg>
      </div>
      <div class="pc-value">184<span class="unit">點</span></div>
      <div class="pc-usage-row"><span>本月發送量</span><span class="num">12,480 / 20,000</span></div>
      <div class="pc-bar"><span></span></div>
      <button class="pc-topup" id="btnTopup">儲值</button>
    </div>
    <div class="sidebar-hint">共 6 個功能群組 · 平台不留存客戶名單</div>
  </aside>

  <div class="backdrop" id="backdrop"></div>

  <div class="main-col">
    <header class="topbar">
      <div style="display:flex; align-items:center; gap:10px; min-width:0;">
        <button class="icon-btn hamburger" id="hamburgerBtn" aria-label="開啟導覽">
          <svg class="ico" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M2 5h14M2 9h14M2 13h14"/></svg>
        </button>
        <div class="crumb" id="crumb"></div>
      </div>
      <div class="topbar-actions">
        <button class="icon-btn" id="btnAnnounce" title="重要公告" aria-label="重要公告">
          <svg class="ico" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 3a4 4 0 0 0-4 4v2.2L3.6 12h10.8L13 9.2V7a4 4 0 0 0-4-4Z"/><path d="M7.4 14a1.8 1.8 0 0 0 3.2 0"/></svg>
        </button>
        <div class="popover" id="popAnnounce"><div class="t">重要公告</div>全域元件・出現在 header，不佔用側邊欄空間。</div>

        <button class="icon-btn" id="btnFaq" title="常見問題教學" aria-label="常見問題教學">
          <svg class="ico" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="9" r="6.5"/><path d="M7 7.2a2 2 0 1 1 2.8 1.8c-.7.4-1 .8-1 1.6"/><circle cx="9" cy="12.6" r=".3" fill="currentColor"/></svg>
        </button>
        <div class="popover" id="popFaq"><div class="t">常見問題教學</div>全域元件・同上，供各頁面共用的說明入口。</div>

        <button class="icon-btn" id="btnApi" title="API 文件下載" aria-label="API 文件下載">
          <svg class="ico" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 3v8"/><path d="M5.3 8.4 9 12l3.7-3.6"/><path d="M3.2 14.5h11.6"/></svg>
        </button>
        <div class="popover" id="popApi"><div class="t">API 文件下載</div>全域元件・給工程師串接用的文件入口。</div>

        <button class="avatar-btn" id="btnAvatar" aria-label="帳號選單">A</button>
        <div class="popover" id="popAvatar" style="width:200px;">
          <div class="t">Alvie</div>
          個人資料 / 登出 都放這裡
          <button class="logout" id="btnLogout">登出</button>
        </div>
      </div>
    </header>

    <main class="content" id="content"></main>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function () {
  "use strict";

  const ICONS = {
    home: '<path d="M3 9.2 9 4l6 5.2"/><path d="M5 8v6.3h8V8"/>',
    external: '<path d="M7.2 3h5.8v5.8"/><path d="M13 3 6.2 9.8"/><path d="M4 6v7.2c0 .6.4 1 1 1h7.2"/>',
    send: '<path d="M3 9 15 3 9 15l-1.4-4.4L3 9Z"/>',
    chart: '<path d="M3 15V3"/><path d="M3 15h12"/><rect x="5" y="9.5" width="1.8" height="3.5" rx=".3"/><rect x="9" y="6" width="1.8" height="7" rx=".3"/><rect x="13" y="11" width="1.8" height="2" rx=".3"/>',
    users: '<circle cx="6.2" cy="6" r="2"/><circle cx="12" cy="6.4" r="1.7"/><path d="M2.2 15c0-2.6 1.9-4.2 4-4.2s4 1.6 4 4.2"/><path d="M10.6 11c1.8.2 3.2 1.7 3.2 4"/>',
    card: '<rect x="2" y="4.3" width="14" height="9.6" rx="1.6"/><path d="M2 7.4h14"/>',
    org: '<rect x="4.2" y="3" width="9.6" height="12" rx="1"/><path d="M6.7 6h1M10.3 6h1M6.7 9h1M10.3 9h1M6.7 12h1M10.3 12h1"/>',
    gear: '<circle cx="9" cy="9" r="2.6"/><path d="M9 2.3v2M9 13.7v2M2.3 9h2M13.7 9h2M4.4 4.4l1.4 1.4M12.2 12.2l1.4 1.4M13.6 4.4l-1.4 1.4M5.8 12.2l-1.4 1.4"/>',
    chevRight: '<path d="M6.5 3.5 11 9l-4.5 5.5"/>',
    flag: '<path d="M4.2 15V3"/><path d="M4.2 3.2h9l-2 3 2 3h-9"/>'
  };
  function icon(name, extra) {
    return '<svg class="ico" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" ' + (extra||'') + '>' + ICONS[name] + '</svg>';
  }

  // ---- IA data, mirrors the E8D TO-BE FigJam tree ----
  const NAV = [
    { id: "overview", label: "總覽", kind: "dashboard", icon: "home" },
    { id: "talkod", label: "互動回覆簡訊", kind: "external", icon: "send",
      detail: "外部連結（TalkOD），點擊後另開分頁，不在此後台內顯示頁面。" },
    { id: "messaging", label: "訊息發送", kind: "group", icon: "send", children: [
      { id: "sms-send", label: "簡訊發送", tabs: ["SMS 簡訊發送", "MMS 簡訊發送"],
        detail: "收訊人選取為發送流程內的共用步驟：載入大量名單／手動輸入（名單不留存，發送完成即清除）" },
      { id: "param-send", label: "參數簡訊發送", tabs: ["SMS 參數簡訊發送", "MMS 參數訊息發送"],
        detail: "收訊人選取為發送流程內的共用步驟：載入大量名單／手動輸入（名單不留存，發送完成即清除）" },
      { id: "schedule-send", label: "預約簡訊維護", tabs: [] }
    ]},
    { id: "reports", label: "訊息紀錄報表", kind: "group", icon: "chart", children: [
      { id: "send-query", label: "發送查詢", tabs: ["SMS 報表", "MMS 報表"],
        detail: "每份報表涵蓋：發送紀錄／歷史發送紀錄／發送回覆明細" },
      { id: "manage-report", label: "管理報表", tabs: ["SMS 報表", "MMS 報表"],
        detail: "查詢維度：公司／部門／成員" }
    ]},
    { id: "billing", label: "帳務與點數", kind: "group", icon: "card", children: [
      { id: "topup", label: "儲值", tabs: [], detail: "含級距價格表",
        flag: "未來需支援計費模式變體（後付客戶可能無需儲值）" },
      { id: "billing-manage", label: "帳單與帳務", phase2: true, tabs: ["儲值紀錄", "使用紀錄"] },
      { id: "subscription", label: "訂閱方案", phase2: true, tabs: ["合約概要", "使用扣款紀錄"] },
      { id: "invoice", label: "發票管理", phase2: true, tabs: [] },
      { id: "sub-points", label: "子帳號點數管理", tabs: ["立即撥點", "預約撥點"] },
      { id: "points-schedule-report", label: "點數預約撥點報表", tabs: [] }
    ]},
    { id: "org", label: "組織與子帳號", kind: "group", icon: "org", children: [
      { id: "org-tree", label: "公司組織樹", tabs: [] },
      { id: "sub-account", label: "子帳號管理", tabs: ["部門維護", "部門主管", "部門所屬帳號"] }
    ]},
    { id: "settings", label: "設定", kind: "group", icon: "gear", children: [
      { id: "notify-settings", label: "通知設定", phase2: true,
        tabs: ["帳務通知", "到期提醒", "使用量提醒", "系統更新", "行銷資訊"] },
      { id: "account-settings", label: "帳戶設定", tabs: ["公司資訊", "預約發送代表號", "個人資料", "密碼"] },
      { id: "advanced-settings", label: "進階設定", tabs: ["回覆轉寄", "國際簡訊", "發送回報設定"] }
    ]}
  ];

  const OVERVIEW_CARDS = [
    { label: "〔Phase 2〕儀表板", phase2: true, body: ["未來需支援三種計費模式：預付／月結／後付"] },
    { label: "帳戶餘額 / 本月帳單 / 未付款提醒", body: ["帳務摘要卡片"] },
    { label: "今日發送量 / 本月總發送 / 目標達成率", body: ["發送量摘要卡片"] },
    { label: "合約概要", body: ["合約狀態摘要卡片"] }
  ];

  const state = { activeTop: "overview", activeChildId: null, activeTabIndex: 0, expandedGroup: null };

  function findChild(group, childId) {
    return (group.children || []).find(function (c) { return c.id === childId; });
  }

  function render() {
    renderSidebar();
    renderContent();
  }

  function renderSidebar() {
    const scroll = document.getElementById("navScroll");
    let html = "";
    NAV.forEach(function (item) {
      if (item.kind === "group") {
        const expanded = state.expandedGroup === item.id;
        const isActiveGroup = state.activeTop === item.id;
        html += '<button class="nav-row' + (isActiveGroup && !expanded ? " active" : "") + '" data-group="' + item.id + '" aria-expanded="' + expanded + '">' +
          icon(item.icon) + '<span class="label">' + item.label + '</span>' + icon("chevRight", 'class="ico chev"') +
          '</button>';
        if (expanded) {
          html += '<div class="nav-group-children">';
          item.children.forEach(function (child) {
            const active = state.activeTop === item.id && state.activeChildId === child.id;
            html += '<button class="nav-child' + (active ? " active" : "") + '" data-group="' + item.id + '" data-child="' + child.id + '">' +
              '<span class="label">' + child.label + '</span>' +
              (child.phase2 ? '<span class="p2-badge">P2</span>' : '') +
              '</button>';
          });
          html += '</div>';
        }
      } else {
        const active = state.activeTop === item.id;
        html += '<button class="nav-row' + (active ? " active" : "") + '" data-top="' + item.id + '">' +
          icon(item.icon) + '<span class="label">' + item.label + '</span>' +
          (item.kind === "external" ? icon("external", 'class="ico ext-mark"') : "") +
          '</button>';
      }
    });
    scroll.innerHTML = html;

    scroll.querySelectorAll("[data-group]:not([data-child])").forEach(function (btn) {
      btn.addEventListener("click", function () {
        const gid = btn.getAttribute("data-group");
        state.expandedGroup = state.expandedGroup === gid ? null : gid;
        if (state.expandedGroup === gid) {
          state.activeTop = gid;
          const group = NAV.find(function (n) { return n.id === gid; });
          if (!state.activeChildId || !findChild(group, state.activeChildId)) {
            state.activeChildId = group.children[0].id;
            state.activeTabIndex = 0;
          }
        }
        render();
      });
    });
    scroll.querySelectorAll("[data-child]").forEach(function (btn) {
      btn.addEventListener("click", function (e) {
        e.stopPropagation();
        state.activeTop = btn.getAttribute("data-group");
        state.activeChildId = btn.getAttribute("data-child");
        state.activeTabIndex = 0;
        render();
        closeSidebarOnMobile();
      });
    });
    scroll.querySelectorAll("[data-top]").forEach(function (btn) {
      btn.addEventListener("click", function () {
        state.activeTop = btn.getAttribute("data-top");
        state.activeChildId = null;
        state.expandedGroup = null;
        state.activeTabIndex = 0;
        render();
        closeSidebarOnMobile();
        if (state.activeTop === "talkod") showToast("外部連結：實際點擊會另開 TalkOD 分頁");
      });
    });
  }

  function renderContent() {
    const crumb = document.getElementById("crumb");
    const content = document.getElementById("content");
    const topItem = NAV.find(function (n) { return n.id === state.activeTop; });

    const protoNote = '<div class="proto-note">' + icon("home") +
      '<div><b>導覽結構原型</b> — 側邊欄項目＝一個頁面，頁面內的 Tab＝下一層分類。點左邊試試每個項目會對應到什麼內容，尚未套用視覺風格。</div></div>';

    if (topItem.kind === "dashboard") {
      crumb.innerHTML = '<span class="current">總覽</span>';
      let cards = "";
      OVERVIEW_CARDS.forEach(function (c) {
        cards += '<div class="kpi-card"><div class="k-label">' + c.label +
          (c.phase2 ? '<span class="p2-badge">P2</span>' : '') + '</div><div class="k-body">' +
          c.body.map(function (b) { return "<div>" + b + "</div>"; }).join("") + '</div></div>';
      });
      content.innerHTML = protoNote +
        '<div class="page-head"><h1>總覽</h1></div>' +
        '<div class="page-sub">後台登入後的首頁，卡片內容尚未展開細節</div>' +
        '<div class="kpi-grid">' + cards + '</div>';
      return;
    }

    if (topItem.kind === "external") {
      crumb.innerHTML = '<span class="current">互動回覆簡訊</span>';
      content.innerHTML = protoNote +
        '<div class="ext-card">' + icon("external", 'style="width:22px;height:22px"') +
        '<div><h2>互動回覆簡訊（TalkOD）</h2><p>' + topItem.detail + ' 建議在側邊欄用外部連結圖示標示，讓使用者知道這不是站內頁面。</p></div></div>';
      return;
    }

    // group -> child
    const child = findChild(topItem, state.activeChildId) || topItem.children[0];
    crumb.innerHTML = '<span>' + topItem.label + '</span><span class="sep">›</span><span class="current">' + child.label +
      (child.phase2 ? '<span class="p2-badge" style="margin-left:6px;">Phase 2</span>' : '') + '</span>';

    let html = protoNote + '<div class="page-head"><h1>' + child.label + '</h1></div>';

    if (child.tabs && child.tabs.length > 0) {
      let tabsHtml = '<div class="tabbar">';
      child.tabs.forEach(function (t, i) {
        tabsHtml += '<button class="tab' + (i === state.activeTabIndex ? " active" : "") + '" data-tab="' + i + '">' + t + '</button>';
      });
      tabsHtml += '</div>';
      html += tabsHtml;
      if (child.detail) html += '<div class="detail-note">' + child.detail + '</div>';
      if (child.flag) html += '<div class="flag-note">' + icon("flag") + '<div>' + child.flag + '</div></div>';
      const activeTabLabel = child.tabs[state.activeTabIndex];
      html += '<div class="placeholder-card"><div class="big">〔內容區〕' + activeTabLabel + '</div>此 Tab 對應原架構圖中的第三層節點，實際頁面內容之後再設計</div>';
    } else {
      if (child.detail) html += '<div class="detail-note">' + child.detail + '</div>';
      if (child.flag) html += '<div class="flag-note">' + icon("flag") + '<div>' + child.flag + '</div></div>';
      html += '<div class="placeholder-card"><div class="big">〔內容區〕' + child.label + '</div>此項目沒有下一層 Tab，直接是單一頁面</div>';
    }

    content.innerHTML = html;
    content.querySelectorAll("[data-tab]").forEach(function (btn) {
      btn.addEventListener("click", function () {
        state.activeTabIndex = parseInt(btn.getAttribute("data-tab"), 10);
        renderContent();
      });
    });
  }

  // ---- topbar popovers ----
  function wirePopover(btnId, popId) {
    const btn = document.getElementById(btnId);
    const pop = document.getElementById(popId);
    btn.addEventListener("click", function (e) {
      e.stopPropagation();
      const willOpen = !pop.classList.contains("open");
      document.querySelectorAll(".popover.open").forEach(function (p) { p.classList.remove("open"); });
      if (willOpen) pop.classList.add("open");
    });
  }
  wirePopover("btnAnnounce", "popAnnounce");
  wirePopover("btnFaq", "popFaq");
  wirePopover("btnApi", "popApi");
  wirePopover("btnAvatar", "popAvatar");
  document.addEventListener("click", function () {
    document.querySelectorAll(".popover.open").forEach(function (p) { p.classList.remove("open"); });
  });
  document.getElementById("btnLogout").addEventListener("click", function (e) {
    e.stopPropagation();
    document.getElementById("popAvatar").classList.remove("open");
    showToast("已登出（示意）");
  });

  // ---- toast ----
  let toastTimer = null;
  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function () { t.classList.remove("show"); }, 2400);
  }

  // ---- 側欄點數卡：儲值捷徑 ----
  document.getElementById("btnTopup").addEventListener("click", function () {
    state.activeTop = "billing";
    state.activeChildId = "topup";
    state.expandedGroup = "billing";
    state.activeTabIndex = 0;
    render();
    closeSidebarOnMobile();
    showToast("全域元件：點數卡的儲值捷徑，直達 帳務與點數 › 儲值");
  });

  // ---- mobile sidebar ----
  const shell = document.getElementById("shell");
  document.getElementById("hamburgerBtn").addEventListener("click", function () {
    shell.classList.add("sidebar-open");
  });
  document.getElementById("backdrop").addEventListener("click", function () {
    shell.classList.remove("sidebar-open");
  });
  function closeSidebarOnMobile() {
    shell.classList.remove("sidebar-open");
  }

  render();
})();
</script>

</body>
</html>
